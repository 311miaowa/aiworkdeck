name: Desktop Build

# Builds desktop installers (experimental: UI shell + bundled frontend; backend
# services still require a local environment — see issue #11).
on:
  workflow_dispatch:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/desktop-build.yml'
      - 'desktop/**'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build:h5
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Package installers (macOS, signed & notarized)
        if: runner.os == 'macOS'
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Safe here: GitHub never exposes secrets to fork PRs, so CSC_LINK is
          # empty for untrusted PRs and signing is silently skipped for them.
          CSC_FOR_PULL_REQUEST: 'true'
        run: npx electron-builder --publish never
      - name: Package installers (Windows, unsigned)
        if: runner.os == 'Windows'
        working-directory: desktop
        env:
          # Windows code signing not set up yet (issue #12)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: aiworkdeck-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: error
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.exe
