server:
  port: 9696

spring:
  application:
    name: checkba-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/checkba?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: checkba
    password: checkba123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect

external:
  qichacha:
    base-url: https://api.qichacha.com
    key: f4900a7dd885415cb305edc621f5b490
    secret: 9C16665DB7BA6661FAAC35EF1321FA3C
  wps:
    app-id: AK20251215TTJNYB
    app-secret: ofsDctOavehqtBubXPuCCemjpkvLFoHy
    callback-base-url: https://checkbahttps.vip.cpolar.cn  # 使用 cpolar 内网穿透地址，供 WPS 回调使用
  tushare:
    base-url: http://api.tushare.pro
    token: ${TUSHARE_TOKEN:}

# AI 大模型配置（生产环境建议全部走环境变量）
ai:
  model:
    provider: ollama
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model-name: ${GEMINI_MODEL_NAME:gemini-1.5-pro}
      api-base-url: ${GEMINI_API_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      timeout: ${GEMINI_TIMEOUT:60s}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_MODEL_NAME:qwen3-vl:8b}
      temperature: ${OLLAMA_TEMPERATURE:0.7}
      timeout: ${OLLAMA_TIMEOUT:300s}

# 文件存储配置
storage:
  # 生产环境建议使用对象存储
  type: local  # 或 oss
  local:
    root-path: /data/checkba/wps-files  # 生产环境建议使用绝对路径
    template-path: /data/checkba/docs/template.docx
  oss:
    provider: aliyun  # 或 aws、minio
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
    region: ${OSS_REGION:oss-cn-hangzhou}
    endpoint: ${OSS_ENDPOINT:}
    path-prefix: wps-files/
    use-https: true
    cdn-domain: ${OSS_CDN_DOMAIN:}
