server {
    listen 80;
    server_name api.checkba.yourdomain.com;  # 替换成你的实际域名

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.checkba.yourdomain.com;  # 替换成你的实际域名

    # SSL 证书配置（宝塔会自动配置，这里只是示例）
    ssl_certificate /www/server/panel/vhost/cert/api.checkba.yourdomain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/api.checkba.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 日志
    access_log /www/wwwlogs/api.checkba.yourdomain.com.log;
    error_log /www/wwwlogs/api.checkba.yourdomain.com.error.log;

    # 反向代理到后端
    location / {
        proxy_pass http://127.0.0.1:9696;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果后续需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点（可选）
    location /actuator/health {
        proxy_pass http://127.0.0.1:9696/actuator/health;
        access_log off;
    }
}

