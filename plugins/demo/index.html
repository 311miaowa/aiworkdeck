<!DOCTYPE html>
<html>
<head>

    <title>Demo Plugin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 24px;

        .card {

</head>

    <div class="card">
        <h1>Welcome to Demo Plugin</h1>
